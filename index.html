<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>₹upe SAVAGE • Bill Aware Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0B0F17 0%, #02050A 100%);
      font-family: 'Space Grotesk', monospace;
      color: #EFF6FF;
      padding: 1rem;
      min-height: 100vh;
    }

    .nexus {
      max-width: 680px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .glass {
      background: rgba(8, 18, 28, 0.65);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 1.2rem;
    }

    .balance-area {
      text-align: center;
    }
    .balance-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7bcbff;
    }
    .balance-number {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #7bcbff, #00c3ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1.1;
    }
    .rupee-sym {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #7bcbff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .dual-mic {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }
    .mic-card {
      flex: 1;
      background: rgba(0, 20, 30, 0.7);
      border-radius: 1.8rem;
      padding: 1rem 0.8rem;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 210, 255, 0.4);
    }
    .mic-btn {
      width: 70px;
      height: 70px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 0 12px rgba(0,200,255,0.3);
    }
    .mic-btn:active { transform: scale(0.93); }
    .spend-mic { background: radial-gradient(circle at 30% 20%, #FF4D4D, #B22222); border: 2px solid #ff8888; }
    .add-mic { background: radial-gradient(circle at 30% 20%, #2E8B57, #1E5A3A); border: 2px solid #6effb0; }
    .mic-icon { font-size: 2.2rem; color: white; }
    .mic-status { font-size: 0.65rem; margin-top: 4px; font-weight: 500; text-align: center; }
    .manual-row {
      margin-top: 12px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .manual-row input, .manual-row button {
      background: #07212e;
      border: 1px solid #2c9ac0;
      border-radius: 2rem;
      padding: 6px 10px;
      color: white;
      font-size: 0.7rem;
    }
    .manual-row button {
      background: #1a5f7a;
      cursor: pointer;
    }
    .badass-quote {
      background: linear-gradient(95deg, #0a1423, #010b12);
      border-radius: 2rem;
      padding: 0.7rem 1rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      border-left: 4px solid #ffcc00;
    }
    .two-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .info-panel {
      background: rgba(5, 15, 24, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem;
    }
    .info-panel h3 {
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .tx-scroll, .bill-scroll {
      max-height: 220px;
      overflow-y: auto;
    }
    .tx-item, .bill-item {
      background: #0a1a28aa;
      border-radius: 2rem;
      padding: 8px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid cyan;
      font-size: 0.75rem;
    }
    .tx-name { background: #0c3b55; padding: 2px 10px; border-radius: 40px; }
    .tx-amount { font-weight: 800; color: #ffbf85; }
    .delete-tx, .delete-bill { background: none; border: none; color: #8bb5cc; cursor: pointer; }
    .summary-btn {
      width: 100%;
      background: #1a5f7a;
      border: none;
      border-radius: 2rem;
      padding: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .summary-table {
      width: 100%;
      font-size: 0.7rem;
      border-collapse: collapse;
    }
    .summary-table td, .summary-table th {
      padding: 6px 3px;
      border-bottom: 1px solid #2f6080;
    }
    .set-balance-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background: #020d16aa;
      border-radius: 3rem;
      padding: 6px 12px;
    }
    .set-balance-row input {
      background: #07212e;
      border: 1px solid #2c9ac0;
      border-radius: 3rem;
      padding: 8px 14px;
      width: 130px;
      text-align: center;
      color: white;
    }
    .set-balance-row button {
      background: #1b6f8f;
      border: none;
      border-radius: 2rem;
      padding: 8px 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .bill-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }
    .bill-form input, .bill-form button {
      background: #07212e;
      border: 1px solid #2c9ac0;
      border-radius: 2rem;
      padding: 8px 12px;
      color: white;
    }
    .bill-form button {
      background: #1a6f4a;
      cursor: pointer;
    }
    @media (max-width: 550px) {
      .two-grid { grid-template-columns: 1fr; }
      .balance-number { font-size: 2.8rem; }
      .dual-mic { flex-direction: column; }
    }
    .listening-pulse {
      animation: pulseRing 0.9s infinite;
    }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(0, 255, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
    }
  </style>
</head>
<body>
<div class="nexus">
  <!-- Balance -->
  <div class="glass">
    <div class="balance-area">
      <div class="balance-label"><i class="fas fa-skull-crossbones"></i> WAR CHEST</div>
      <div class="balance-number"><span class="rupee-sym">₹</span><span id="globalBalance">0</span></div>
    </div>
  </div>

  <!-- DUAL MIC + MANUAL -->
  <div class="dual-mic">
    <!-- SPEND CARD -->
    <div class="mic-card">
      <div id="spendMicBtn" class="mic-btn spend-mic"><i class="fas fa-microphone-alt mic-icon"></i></div>
      <div class="mic-status" id="spendMicStatus">⚡ voice: "chai 10"</div>
      <div class="manual-row">
        <input type="text" id="manualSpendItem" placeholder="item" style="flex:1">
        <input type="number" id="manualSpendAmt" placeholder="₹" style="width:70px">
        <button id="manualSpendBtn">Spend</button>
      </div>
    </div>
    <!-- ADD MONEY CARD -->
    <div class="mic-card">
      <div id="addMicBtn" class="mic-btn add-mic"><i class="fas fa-microphone-alt mic-icon"></i></div>
      <div class="mic-status" id="addMicStatus">💰 voice: "add 200"</div>
      <div class="manual-row">
        <input type="number" id="manualAddAmt" placeholder="₹ amount" style="flex:1">
        <button id="manualAddBtn">Add</button>
      </div>
    </div>
  </div>

  <!-- Badass quote -->
  <div class="badass-quote" id="quoteBox"><i class="fas fa-dragon"></i> “Rupees don't grow on trees — they grow in discipline.”</div>

  <!-- Update Balance (no history wipe) -->
  <div class="set-balance-row">
    <input type="number" id="updateBalanceInput" placeholder="update balance ₹" value="2500">
    <button id="updateBalanceBtn">⚡ UPDATE BALANCE</button>
  </div>

  <!-- Spend Log & Summary -->
  <div class="two-grid">
    <div class="info-panel">
      <h3><i class="fas fa-scroll"></i> SPEND LOG</h3>
      <div id="transactionList" class="tx-scroll"><div style="text-align:center; opacity:0.6;">✨ no spends yet</div></div>
    </div>
    <div class="info-panel">
      <h3><i class="fas fa-chart-line"></i> SUMMARY</h3>
      <button id="summaryBtn" class="summary-btn"><i class="fas fa-chart-simple"></i> GENERATE SUMMARY</button>
      <div id="summaryArea" style="max-height:200px; overflow-y:auto;"><div style="font-size:0.7rem; text-align:center;">📊 tap to see breakdown</div></div>
    </div>
  </div>

  <!-- BILL TRACKER SECTION -->
  <div class="glass">
    <h3 style="display:flex; gap:8px; margin-bottom:12px;"><i class="fas fa-calendar-exclamation"></i> BILL WATCHDOG</h3>
    <div class="bill-form">
      <input type="text" id="billType" placeholder="e.g., Mobile Recharge" style="flex:2">
      <input type="number" id="billValidity" placeholder="validity (days)" style="width:100px">
      <button id="addBillBtn">➕ ADD BILL</button>
    </div>
    <div id="billsList" class="bill-scroll">
      <div style="text-align:center; opacity:0.6;">📭 no bills added</div>
    </div>
  </div>
</div>

<script>
  // ---------- GLOBAL STATE ----------
  let balance = 2500;
  let transactions = [];      // { id, amount, item, timestamp }
  let bills = [];            // { id, type, validityDays, startDate (ISO), dueDate, endsIn }

  // DOM
  const balanceSpan = document.getElementById('globalBalance');
  const txnContainer = document.getElementById('transactionList');
  const summaryDiv = document.getElementById('summaryArea');
  const quoteBox = document.getElementById('quoteBox');
  const billsContainer = document.getElementById('billsList');

  // helpers
  const formatMoney = (val) => Math.floor(val) === val ? val.toString() : val.toFixed(2);
  function persistAll() {
    localStorage.setItem('savageWalletData', JSON.stringify({ balance, transactions, bills }));
  }
  function loadAll() {
    const saved = localStorage.getItem('savageWalletData');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        balance = typeof data.balance === 'number' ? data.balance : 2500;
        transactions = Array.isArray(data.transactions) ? data.transactions : [];
        bills = Array.isArray(data.bills) ? data.bills : [];
        // migrate old bills without startDate? recalc
        bills = bills.filter(b => b && b.type).map(b => {
          if (!b.startDate) b.startDate = new Date().toISOString();
          return b;
        });
      } catch(e) { resetDefault(); }
    } else { resetDefault(); }
    renderAll();
    checkBillNotifications(); // on load
  }
  function resetDefault() {
    balance = 2500;
    transactions = [];
    bills = [];
    persistAll();
    renderAll();
  }
  function renderAll() {
    balanceSpan.innerText = formatMoney(balance);
    renderTransactions();
    renderBills();
  }
  function renderTransactions() {
    if (!transactions.length) { txnContainer.innerHTML = `<div style="text-align:center; opacity:0.6;">📭 no spends yet</div>`; return; }
    txnContainer.innerHTML = transactions.map(tx => `
      <div class="tx-item">
        <div><span class="tx-name">${escapeHtml(tx.item)}</span> <span style="font-size:0.6rem;">${tx.timestamp}</span></div>
        <div><span class="tx-amount">₹${formatMoney(tx.amount)}</span>
        <button class="delete-tx" data-id="${tx.id}"><i class="fas fa-trash-can"></i></button></div>
      </div>
    `).join('');
    document.querySelectorAll('.delete-tx').forEach(btn => {
      btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if(id) deleteTransaction(id); });
    });
  }
  function deleteTransaction(txId) {
    const idx = transactions.findIndex(t => t.id == txId);
    if (idx === -1) return;
    balance += transactions[idx].amount;
    transactions.splice(idx, 1);
    persistAll(); renderAll();
    speakMessage(`Refunded ₹${formatMoney(transactions[idx]?.amount)}. New balance ₹${formatMoney(balance)}`);
    updateRandomQuote();
  }

  // SPEND & ADD CORE
  function deductExpense(amount, item) {
    if (isNaN(amount) || amount <= 0) { speakMessage("Invalid amount", true); return false; }
    if (!item.trim()) { speakMessage("Item name missing", true); return false; }
    if (amount > balance) { speakMessage(`Insufficient! You have ₹${formatMoney(balance)}`, true); return false; }
    balance -= amount;
    transactions.unshift({ id: Date.now() + Math.random(), amount, item: item.trim(), timestamp: new Date().toLocaleString() });
    persistAll(); renderAll();
    const msg = `Sir you spend ${formatMoney(amount)} on ${item}. Remaining balance is ${formatMoney(balance)}`;
    speakMessage(msg);
    showToast(`💸 ₹${formatMoney(amount)} for ${item}`);
    updateRandomQuote();
    return true;
  }
  function addMoney(amount) {
    if (isNaN(amount) || amount <= 0) { speakMessage("Enter positive amount", true); return false; }
    balance += amount;
    persistAll(); renderAll();
    speakMessage(`Added ₹${formatMoney(amount)}. New balance ₹${formatMoney(balance)}`);
    showToast(`+ ₹${formatMoney(amount)} added`);
    updateRandomQuote();
    return true;
  }
  function updateBalanceOnly(newBal) {
    if (isNaN(newBal) || newBal < 0) { showToast("Invalid balance", true); return; }
    balance = newBal;
    persistAll(); renderAll();
    speakMessage(`Balance updated to ₹${formatMoney(balance)}.`);
    showToast(`Balance → ₹${formatMoney(balance)}`);
  }

  // VOICE: spend: "chai 10" (item then amount)
  let spendRecog = null, addRecog = null;
  let spendListening = false, addListening = false;
  function initSpendVoice() {
    if (!('webkitSpeechRecognition' in window)) return false;
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    spendRecog = new SpeechRec();
    spendRecog.continuous = false; spendRecog.interimResults = false; spendRecog.lang = 'en-IN';
    spendRecog.onstart = () => { spendListening = true; document.getElementById('spendMicStatus').innerHTML = "🎤 listening..."; document.getElementById('spendMicBtn').classList.add('listening-pulse'); };
    spendRecog.onend = () => { spendListening = false; document.getElementById('spendMicStatus').innerHTML = "⚡ voice: 'chai 10'"; document.getElementById('spendMicBtn').classList.remove('listening-pulse'); };
    spendRecog.onerror = () => { spendListening = false; document.getElementById('spendMicStatus').innerHTML = "⚠️ retry"; showToast("Mic error", true); };
    spendRecog.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      const parsed = parseSpend(transcript);
      if (parsed) deductExpense(parsed.amount, parsed.item);
      else { showToast(`❌ Say "chai 10"`, true); speakMessage("Say item then amount, like chai 10", true); }
    };
    return true;
  }
  function parseSpend(txt) {
    let lower = txt.trim().toLowerCase();
    let match = lower.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*$/i);
    if (match && !lower.startsWith('add') && !lower.startsWith('credit')) {
      let item = match[1].trim(), amount = parseFloat(match[2]);
      if (item && amount > 0) return { item, amount };
    }
    return null;
  }
  function initAddVoice() {
    if (!('webkitSpeechRecognition' in window)) return false;
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    addRecog = new SpeechRec();
    addRecog.continuous = false; addRecog.interimResults = false; addRecog.lang = 'en-IN';
    addRecog.onstart = () => { addListening = true; document.getElementById('addMicStatus').innerHTML = "🎤 listening..."; document.getElementById('addMicBtn').classList.add('listening-pulse'); };
    addRecog.onend = () => { addListening = false; document.getElementById('addMicStatus').innerHTML = "💰 voice: 'add 200'"; document.getElementById('addMicBtn').classList.remove('listening-pulse'); };
    addRecog.onerror = () => { addListening = false; showToast("Add mic error", true); };
    addRecog.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      let amount = parseAdd(transcript);
      if (amount !== null && amount > 0) addMoney(amount);
      else { showToast(`Say "add 100"`, true); speakMessage("Say add followed by number", true); }
    };
    return true;
  }
  function parseAdd(text) {
    let lower = text.trim().toLowerCase();
    let match = lower.match(/^(?:add|credit|deposit)\s+(\d+(?:\.\d+)?)\s*$/i);
    if (match) return parseFloat(match[1]);
    let num = lower.match(/^(\d+(?:\.\d+)?)\s*$/);
    if (num) return parseFloat(num[1]);
    return null;
  }

  // BILL TRACKER LOGIC (with due dates & notifications)
  function addBill(type, validityDays) {
    if (!type.trim() || validityDays <= 0) { showToast("Enter valid bill type & days", true); return; }
    const startDate = new Date();
    const dueDate = new Date(startDate);
    dueDate.setDate(startDate.getDate() + validityDays);
    const newBill = {
      id: Date.now(),
      type: type.trim(),
      validityDays: validityDays,
      startDate: startDate.toISOString(),
      dueDate: dueDate.toISOString()
    };
    bills.push(newBill);
    persistAll();
    renderBills();
    showToast(`📅 Bill "${type}" added, due on ${dueDate.toLocaleDateString()}`);
    checkBillNotifications(true); // immediate notification for this bill
  }
  function deleteBill(billId) {
    bills = bills.filter(b => b.id != billId);
    persistAll();
    renderBills();
    showToast("Bill removed", false);
  }
  function renderBills() {
    if (!bills.length) { billsContainer.innerHTML = `<div style="text-align:center; opacity:0.6;">📭 no recurring bills</div>`; return; }
    const now = new Date();
    let html = `<table style="width:100%; font-size:0.7rem; border-collapse:collapse;"><thead><tr><th>Bill type</th><th>Validity</th><th>Ends in</th><th>Next due</th><th></th></tr></thead><tbody>`;
    bills.forEach(b => {
      const start = new Date(b.startDate);
      const due = new Date(b.dueDate);
      const daysLeft = Math.max(0, Math.ceil((due - now) / (1000*60*60*24)));
      const endsInText = daysLeft === 0 ? "EXPIRED" : `${daysLeft} day${daysLeft!==1?'s':''}`;
      const dueDateStr = due.toLocaleDateString();
      html += `<tr style="border-bottom:1px solid #2f6080;">
        <td>${escapeHtml(b.type)}</td>
        <td>${b.validityDays} days</td>
        <td style="color:${daysLeft<=3?'#ff8866':'#88ffaa'}">${endsInText}</td>
        <td>${dueDateStr}</td>
        <td><button class="delete-bill" data-id="${b.id}" style="background:none; border:none; color:#ff8888;"><i class="fas fa-trash"></i></button></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    billsContainer.innerHTML = html;
    document.querySelectorAll('.delete-bill').forEach(btn => {
      btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if(id) deleteBill(id); });
    });
  }
  function checkBillNotifications(forceSpeak = false) {
    const now = new Date();
    let notified = false;
    for (let b of bills) {
      const due = new Date(b.dueDate);
      const daysLeft = Math.ceil((due - now) / (1000*60*60*24));
      if (daysLeft === 7 || daysLeft === 2 || (daysLeft <= 7 && daysLeft > 0 && forceSpeak)) {
        speakMessage(`Sir, your ${b.type} ends in ${daysLeft} days.`, false);
        notified = true;
        break; // speak one at a time to avoid spam
      } else if (daysLeft === 1) {
        speakMessage(`Sir, your ${b.type} ends TOMORROW!`, false);
        notified = true;
        break;
      }
    }
    if (!notified && forceSpeak === false) return;
  }

  // SUMMARY
  function generateSummary() {
    if (!transactions.length) { summaryDiv.innerHTML = `<div style="text-align:center;">📭 No expenses yet</div>`; return; }
    const map = new Map();
    for (let tx of transactions) {
      let key = tx.item.toLowerCase();
      if (map.has(key)) { let e = map.get(key); e.total += tx.amount; e.count++; }
      else map.set(key, { itemName: tx.item, total: tx.amount, count: 1 });
    }
    let sorted = Array.from(map.values()).sort((a,b)=>b.total - a.total);
    let grand = 0, html = `<table class="summary-table"><thead><tr><th>Item</th><th>Total (₹)</th><th>#</th></tr></thead><tbody>`;
    for (let e of sorted) { html += `<tr><td>${escapeHtml(e.itemName)}</td><td style="color:#ffbf69;">₹${formatMoney(e.total)}</td><td>${e.count}</td></tr>`; grand += e.total; }
    html += `<tr style="border-top:2px solid #3c8db0;"><td><strong>TOTAL SPENT</strong></td><td><strong>₹${formatMoney(grand)}</strong></td><td>${transactions.length}</td></tr>`;
    html += `</tbody></table><div style="margin-top:8px;">⚡ balance: ₹${formatMoney(balance)}</div>`;
    summaryDiv.innerHTML = html;
  }

  // TTS & UI helpers
  let currentSpeech = null;
  function speakMessage(text, isErr = false) {
    if (window.speechSynthesis) {
      if (currentSpeech) window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9; utterance.lang = 'en-IN';
      currentSpeech = utterance;
      window.speechSynthesis.speak(utterance);
    }
  }
  function showToast(msg, isErr = false) {
    let toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.position = 'fixed'; toast.style.bottom = '20px'; toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)'; toast.style.backgroundColor = isErr ? '#b13e3e' : '#1a6f8f';
    toast.style.color = 'white'; toast.style.padding = '8px 20px'; toast.style.borderRadius = '60px';
    toast.style.fontSize = '0.8rem'; toast.style.zIndex = '1000'; toast.style.border = '1px solid cyan';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1800);
  }
  function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
  const quotes = [`🔥 “Rupees don't grow on trees — they grow in discipline.”`, `💰 “Silence the spend impulse. Invest in your future self.”`, `⚔️ “Every rupee saved is a warrior in your army.”`, `🧠 “Poor mindset spends today. Rich mindset spends tomorrow.”`, `👑 “You don't need 100 things. You need 100 chances.”`, `🚀 “Voice is power. Control your cash flow like a beast.”`, `🎯 “Saving is not an option. It's the only weapon.”`];
  function updateRandomQuote() { quoteBox.innerHTML = `<i class="fas fa-dragon"></i> “${quotes[Math.floor(Math.random()*quotes.length)]}”`; }

  // EVENT LISTENERS
  document.getElementById('spendMicBtn').addEventListener('click', () => { if(!spendRecog) initSpendVoice(); if(spendListening) spendRecog.stop(); try{ spendRecog.start(); }catch(e){ initSpendVoice(); spendRecog?.start(); } });
  document.getElementById('addMicBtn').addEventListener('click', () => { if(!addRecog) initAddVoice(); if(addListening) addRecog.stop(); try{ addRecog.start(); }catch(e){ initAddVoice(); addRecog?.start(); } });
  document.getElementById('manualSpendBtn').addEventListener('click', () => { let item = document.getElementById('manualSpendItem').value, amt = parseFloat(document.getElementById('manualSpendAmt').value); if(item && amt>0) deductExpense(amt, item); else showToast("Enter item & amount", true); document.getElementById('manualSpendItem').value = ''; document.getElementById('manualSpendAmt').value = ''; });
  document.getElementById('manualAddBtn').addEventListener('click', () => { let amt = parseFloat(document.getElementById('manualAddAmt').value); if(amt>0) addMoney(amt); else showToast("Enter amount", true); document.getElementById('manualAddAmt').value = ''; });
  document.getElementById('updateBalanceBtn').addEventListener('click', () => { let newBal = parseFloat(document.getElementById('updateBalanceInput').value); if(!isNaN(newBal) && newBal>=0) updateBalanceOnly(newBal); else showToast("Invalid amount", true); });
  document.getElementById('summaryBtn').addEventListener('click', generateSummary);
  document.getElementById('addBillBtn').addEventListener('click', () => { let type = document.getElementById('billType').value, days = parseInt(document.getElementById('billValidity').value); if(type && days>0) addBill(type, days); else showToast("Enter valid bill type & days", true); document.getElementById('billType').value = ''; document.getElementById('billValidity').value = ''; });

  // on load
  loadAll();
  initSpendVoice(); initAddVoice();
  setInterval(() => { renderBills(); checkBillNotifications(false); }, 3600000); // hourly check
  setTimeout(() => checkBillNotifications(false), 500);
</script>
