<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>₹upe SAVAGE • Voice Wallet</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0B0F17 0%, #02050A 100%);
      font-family: 'Space Grotesk', monospace;
      color: #EFF6FF;
      padding: 1rem;
      min-height: 100vh;
    }

    /* main container */
    .nexus {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* glass cards */
    .glass {
      background: rgba(8, 18, 28, 0.65);
      backdrop-filter: blur(14px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      padding: 1.2rem;
    }

    /* balance row */
    .balance-area {
      text-align: center;
    }
    .balance-label {
      font-size: 0.7rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #7bcbff;
    }
    .balance-number {
      font-size: 3.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #7bcbff, #00c3ff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      line-height: 1.1;
    }
    .rupee-sym {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFFFF, #7bcbff);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* dual mic row */
    .dual-mic {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .mic-card {
      flex: 1;
      background: rgba(0, 20, 30, 0.7);
      border-radius: 1.8rem;
      padding: 1rem 0.5rem;
      text-align: center;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 210, 255, 0.4);
      transition: 0.2s;
    }
    .mic-btn {
      width: 80px;
      height: 80px;
      margin: 0 auto 10px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 0 12px rgba(0,200,255,0.3);
    }
    .mic-btn:active { transform: scale(0.93); }
    .spend-mic {
      background: radial-gradient(circle at 30% 20%, #FF4D4D, #B22222);
      border: 2px solid #ff8888;
    }
    .add-mic {
      background: radial-gradient(circle at 30% 20%, #2E8B57, #1E5A3A);
      border: 2px solid #6effb0;
    }
    .mic-icon {
      font-size: 2.5rem;
      color: white;
      filter: drop-shadow(0 0 6px rgba(0,0,0,0.5));
    }
    .mic-status {
      font-size: 0.7rem;
      margin-top: 6px;
      font-weight: 500;
    }

    /* quote area */
    .badass-quote {
      background: linear-gradient(95deg, #0a1423, #010b12);
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.85rem;
      border-left: 4px solid #ffcc00;
      font-style: italic;
      letter-spacing: 0.3px;
    }

    /* transaction & summary grid */
    .two-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .info-panel {
      background: rgba(5, 15, 24, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 1.5rem;
      padding: 1rem;
    }
    .info-panel h3 {
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .tx-scroll {
      max-height: 250px;
      overflow-y: auto;
    }
    .tx-item {
      background: #0a1a28aa;
      border-radius: 3rem;
      padding: 8px 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid cyan;
    }
    .tx-name {
      font-weight: 600;
      background: #0c3b55;
      padding: 2px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
    }
    .tx-amount {
      font-weight: 800;
      color: #ffbf85;
    }
    .delete-tx {
      background: none;
      border: none;
      color: #8bb5cc;
      font-size: 1rem;
      cursor: pointer;
    }
    .summary-btn {
      width: 100%;
      background: #1a5f7a;
      border: none;
      border-radius: 2rem;
      padding: 8px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .summary-table {
      width: 100%;
      font-size: 0.7rem;
      border-collapse: collapse;
    }
    .summary-table td, .summary-table th {
      padding: 6px 3px;
      border-bottom: 1px solid #2f6080;
    }

    /* tiny set-balance row */
    .set-balance-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background: #020d16aa;
      border-radius: 3rem;
      padding: 6px 12px;
    }
    .set-balance-row input {
      background: #07212e;
      border: 1px solid #2c9ac0;
      border-radius: 3rem;
      padding: 8px 14px;
      width: 120px;
      text-align: center;
      color: white;
      font-weight: 600;
    }
    .set-balance-row button {
      background: #1b6f8f;
      border: none;
      border-radius: 2rem;
      padding: 6px 14px;
      font-weight: bold;
      cursor: pointer;
    }
    @media (max-width: 550px) {
      .two-grid { grid-template-columns: 1fr; }
      .balance-number { font-size: 2.8rem; }
      .mic-btn { width: 70px; height: 70px; }
      .mic-icon { font-size: 2rem; }
    }

    .listening-pulse {
      animation: pulseRing 0.9s infinite;
    }
    @keyframes pulseRing {
      0% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0.6); }
      70% { box-shadow: 0 0 0 12px rgba(0, 255, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 255, 255, 0); }
    }
  </style>
</head>
<body>
<div class="nexus">
  <!-- BALANCE GLASS -->
  <div class="glass">
    <div class="balance-area">
      <div class="balance-label"><i class="fas fa-skull-crossbones"></i> WAR CHEST</div>
      <div class="balance-number"><span class="rupee-sym">₹</span><span id="globalBalance">0</span></div>
    </div>
  </div>

  <!-- DUAL MIC (SPEND + ADD) -->
  <div class="dual-mic">
    <!-- SPEND MIC (for tea 10) -->
    <div class="mic-card">
      <div id="spendMicBtn" class="mic-btn spend-mic">
        <i class="fas fa-microphone-alt mic-icon"></i>
      </div>
      <div class="mic-status" id="spendMicStatus">⚡ spent money</div>
      <div style="font-size:0.65rem; margin-top:6px;">“for chai 10”</div>
    </div>
    <!-- ADD MIC (add 100 / credit 50) -->
    <div class="mic-card">
      <div id="addMicBtn" class="mic-btn add-mic">
        <i class="fas fa-microphone-alt mic-icon"></i>
      </div>
      <div class="mic-status" id="addMicStatus">💰 add voice</div>
      <div style="font-size:0.65rem; margin-top:6px;">“add 100”</div>
    </div>
  </div>

  <!-- BADASS QUOTE (dynamic) -->
  <div class="badass-quote" id="quoteBox">
    <i class="fas fa-dragon"></i> “Rich is not what you earn. It's what you don't burn.”
  </div>

  <!-- minimal set balance row (only for initial, no extra buttons) -->
  <div class="set-balance-row">
    <input type="number" id="initialBalInput" placeholder="set ₹ balance" value="2500">
    <button id="setBalanceBtn">⚡ SET BALANCE</button>
  </div>

  <!-- 2-col: transaction log & summary -->
  <div class="two-grid">
    <div class="info-panel">
      <h3><i class="fas fa-scroll"></i> SPEND LOG</h3>
      <div id="transactionList" class="tx-scroll">
        <div style="text-align:center; opacity:0.6;">✨ voice spends appear here</div>
      </div>
    </div>
    <div class="info-panel">
      <h3><i class="fas fa-chart-line"></i> SUMMARY</h3>
      <button id="summaryBtn" class="summary-btn"><i class="fas fa-chart-simple"></i> GENERATE SUMMARY</button>
      <div id="summaryArea" style="max-height:200px; overflow-y:auto;">
        <div style="font-size:0.7rem; text-align:center;">📊 tap to see breakdown</div>
      </div>
    </div>
  </div>
</div>

<script>
  // ---------- STATE ----------
  let balance = 0;             // Rupee integer (no decimal float issues)
  let transactions = [];      // { id, amount, item, timestamp }

  // DOM elements
  const balanceSpan = document.getElementById('globalBalance');
  const txnContainer = document.getElementById('transactionList');
  const summaryDiv = document.getElementById('summaryArea');
  const quoteBox = document.getElementById('quoteBox');

  // helper: format without .00
  const formatMoney = (val) => {
    if (Math.floor(val) === val) return val.toString();
    return val.toFixed(2);
  };

  // save & load
  function persist() {
    localStorage.setItem('savageWalletData', JSON.stringify({ balance, transactions }));
  }

  function loadData() {
    const saved = localStorage.getItem('savageWalletData');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        balance = typeof data.balance === 'number' ? data.balance : 0;
        transactions = Array.isArray(data.transactions) ? data.transactions : [];
        transactions = transactions.filter(t => t && typeof t.amount === 'number').map(t => ({
          id: t.id || Date.now(),
          amount: t.amount,
          item: String(t.item),
          timestamp: t.timestamp || new Date().toLocaleString()
        }));
      } catch(e) { resetDefault(); }
    } else {
      resetDefault();
    }
    renderAll();
  }

  function resetDefault() {
    balance = 2500;
    transactions = [];
    persist();
    renderAll();
  }

  function renderAll() {
    balanceSpan.innerText = formatMoney(balance);
    renderTransactions();
  }

  function renderTransactions() {
    if (transactions.length === 0) {
      txnContainer.innerHTML = `<div style="text-align:center; opacity:0.6;">📭 no spends yet</div>`;
      return;
    }
    txnContainer.innerHTML = transactions.map(tx => `
      <div class="tx-item">
        <div><span class="tx-name">${escapeHtml(tx.item)}</span> <span style="font-size:0.6rem;">${tx.timestamp}</span></div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span class="tx-amount">₹${formatMoney(tx.amount)}</span>
          <button class="delete-tx" data-id="${tx.id}"><i class="fas fa-trash-can"></i></button>
        </div>
      </div>
    `).join('');
    document.querySelectorAll('.delete-tx').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = btn.getAttribute('data-id');
        if (id) deleteTransactionById(id);
      });
    });
  }

  function deleteTransactionById(txId) {
    const idx = transactions.findIndex(t => t.id == txId);
    if (idx === -1) return;
    const removed = transactions[idx];
    balance += removed.amount;
    transactions.splice(idx, 1);
    persist();
    renderAll();
    speakMessage(`Refunded ₹${formatMoney(removed.amount)} for ${removed.item}. New balance ₹${formatMoney(balance)}`);
    showToast("Refunded", false);
    updateRandomQuote();
  }

  // ========== CORE VOICE LOGIC ==========
  let spendRecognition = null;
  let addRecognition = null;
  let spendListening = false;
  let addListening = false;

  // Spend mic: parse "for chai 10" or "coffee 20"
  function initSpendSpeech() {
    if (!('webkitSpeechRecognition' in window)) return false;
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    spendRecognition = new SpeechRec();
    spendRecognition.continuous = false;
    spendRecognition.interimResults = false;
    spendRecognition.lang = 'en-IN';
    spendRecognition.onstart = () => {
      spendListening = true;
      document.getElementById('spendMicStatus').innerHTML = "🎤 listening...";
      document.getElementById('spendMicBtn').classList.add('listening-pulse');
    };
    spendRecognition.onend = () => {
      spendListening = false;
      document.getElementById('spendMicStatus').innerHTML = "⚡ spent money";
      document.getElementById('spendMicBtn').classList.remove('listening-pulse');
    };
    spendRecognition.onerror = () => {
      spendListening = false;
      document.getElementById('spendMicStatus').innerHTML = "⚠️ retry";
      document.getElementById('spendMicBtn').classList.remove('listening-pulse');
      showToast("Spend mic error, tap again", true);
    };
    spendRecognition.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      const parsed = parseSpendCommand(transcript);
      if (parsed) {
        deductExpense(parsed.amount, parsed.item);
      } else {
        showToast(`❌ Say "for tea 10"`, true);
        speakMessage("Command format: for item amount", true);
      }
    };
    return true;
  }

  function parseSpendCommand(text) {
    let lower = text.trim().toLowerCase();
    let match = lower.match(/^for\s+(.+?)\s+(\d+(?:\.\d+)?)\s*$/i);
    if (match) return { item: match[1].trim(), amount: parseFloat(match[2]) };
    let alt = lower.match(/^(.+?)\s+(\d+(?:\.\d+)?)\s*$/i);
    if (alt && !lower.startsWith('for')) {
      return { item: alt[1].trim(), amount: parseFloat(alt[2]) };
    }
    return null;
  }

  // Add mic: parse "add 100" / "credit 200"
  function initAddSpeech() {
    if (!('webkitSpeechRecognition' in window)) return false;
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    addRecognition = new SpeechRec();
    addRecognition.continuous = false;
    addRecognition.interimResults = false;
    addRecognition.lang = 'en-IN';
    addRecognition.onstart = () => {
      addListening = true;
      document.getElementById('addMicStatus').innerHTML = "🎤 listening...";
      document.getElementById('addMicBtn').classList.add('listening-pulse');
    };
    addRecognition.onend = () => {
      addListening = false;
      document.getElementById('addMicStatus').innerHTML = "💰 add voice";
      document.getElementById('addMicBtn').classList.remove('listening-pulse');
    };
    addRecognition.onerror = () => {
      addListening = false;
      document.getElementById('addMicStatus').innerHTML = "⚠️ retry";
      document.getElementById('addMicBtn').classList.remove('listening-pulse');
      showToast("Add mic error, tap again", true);
    };
    addRecognition.onresult = (ev) => {
      const transcript = ev.results[0][0].transcript;
      const amount = parseAddCommand(transcript);
      if (amount !== null && amount > 0) {
        addMoney(amount);
      } else {
        showToast(`❌ Say "add 100"`, true);
        speakMessage("Say add followed by number", true);
      }
    };
    return true;
  }

  function parseAddCommand(text) {
    let lower = text.trim().toLowerCase();
    let match = lower.match(/^(?:add|credit|deposit)\s+(\d+(?:\.\d+)?)\s*$/i);
    if (match) return parseFloat(match[1]);
    let simpleNum = lower.match(/^(\d+(?:\.\d+)?)\s*$/);
    if (simpleNum) return parseFloat(simpleNum[1]);
    return null;
  }

  // core actions
  function deductExpense(amount, item) {
    if (isNaN(amount) || amount <= 0) {
      speakMessage("Invalid amount", true);
      return false;
    }
    if (item.trim() === "") {
      speakMessage("Item name missing", true);
      return false;
    }
    if (amount > balance) {
      speakMessage(`Insufficient balance! You have ₹${formatMoney(balance)}. Cannot spend ₹${formatMoney(amount)} on ${item}.`, true);
      return false;
    }
    balance -= amount;
    const newTx = {
      id: Date.now() + Math.random(),
      amount: amount,
      item: item.trim(),
      timestamp: new Date().toLocaleString()
    };
    transactions.unshift(newTx);
    persist();
    renderAll();
    const msg = `Sir you spend ${formatMoney(amount)} on ${item}. Remaining balance is ${formatMoney(balance)}`;
    speakMessage(msg);
    showToast(`💸 ₹${formatMoney(amount)} for ${item}`, false);
    updateRandomQuote();
    return true;
  }

  function addMoney(amount) {
    if (isNaN(amount) || amount <= 0) {
      speakMessage("Please say a positive number", true);
      return false;
    }
    balance += amount;
    persist();
    renderAll();
    speakMessage(`Added ₹${formatMoney(amount)}. New balance ₹${formatMoney(balance)}`);
    showToast(`+ ₹${formatMoney(amount)} added`, false);
    updateRandomQuote();
    return true;
  }

  // set balance (manual, but minimal)
  function setBalanceManually(newBal) {
    if (isNaN(newBal) || newBal < 0) {
      showToast("Enter valid balance", true);
      return;
    }
    if (transactions.length > 0) {
      if (confirm("Setting balance will clear all transaction history. Proceed?")) {
        balance = newBal;
        transactions = [];
        persist();
        renderAll();
        speakMessage(`Balance set to ₹${formatMoney(balance)}. History wiped.`);
        updateRandomQuote();
      }
    } else {
      balance = newBal;
      persist();
      renderAll();
      speakMessage(`Balance set to ₹${formatMoney(balance)}.`);
      updateRandomQuote();
    }
  }

  // summary
  function generateSummary() {
    if (transactions.length === 0) {
      summaryDiv.innerHTML = `<div style="text-align:center; opacity:0.7;">📭 No expenses yet</div>`;
      return;
    }
    const map = new Map();
    for (let tx of transactions) {
      const key = tx.item.toLowerCase();
      if (map.has(key)) {
        let entry = map.get(key);
        entry.total += tx.amount;
        entry.count += 1;
      } else {
        map.set(key, { itemName: tx.item, total: tx.amount, count: 1 });
      }
    }
    const sorted = Array.from(map.values()).sort((a,b) => b.total - a.total);
    let grand = 0;
    let html = `<table class="summary-table"><thead><tr><th>Item</th><th>Total (₹)</th><th>#</th></tr></thead><tbody>`;
    for (let entry of sorted) {
      html += `<tr><td>${escapeHtml(entry.itemName)}</td><td style="color:#ffbf69;">₹${formatMoney(entry.total)}</td><td>${entry.count}</td></tr>`;
      grand += entry.total;
    }
    html += `<tr style="border-top:2px solid #3c8db0;"><td><strong>TOTAL SPENT</strong></td><td><strong>₹${formatMoney(grand)}</strong></td><td>${transactions.length}</td></tr>`;
    html += `</tbody></table><div style="margin-top:8px; font-size:0.7rem;">⚡ current balance: ₹${formatMoney(balance)}</div>`;
    summaryDiv.innerHTML = html;
    showToast("Summary updated", false);
  }

  // random badass quotes
  const quotes = [
    "🔥 “Rupees don't grow on trees — they grow in discipline.”",
    "💰 “Silence the spend impulse. Invest in your future self.”",
    "⚔️ “Every rupee saved is a warrior in your army.”",
    "🧠 “Poor mindset spends today. Rich mindset spends tomorrow.”",
    "👑 “You don't need 100 things. You need 100 chances.”",
    "🚀 “Voice is power. Control your cash flow like a beast.”",
    "🎯 “Saving is not an option. It's the only weapon.”"
  ];
  function updateRandomQuote() {
    const randomIdx = Math.floor(Math.random() * quotes.length);
    quoteBox.innerHTML = `<i class="fas fa-dragon"></i> “${quotes[randomIdx]}”`;
  }

  // TTS & helpers
  let currentSpeech = null;
  function speakMessage(text, isErr = false) {
    if (window.speechSynthesis) {
      if (currentSpeech) window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.9;
      utterance.lang = 'en-IN';
      currentSpeech = utterance;
      window.speechSynthesis.speak(utterance);
    }
  }

  function showToast(msg, isErr) {
    let toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.position = 'fixed';
    toast.style.bottom = '20px';
    toast.style.left = '50%';
    toast.style.transform = 'translateX(-50%)';
    toast.style.backgroundColor = isErr ? '#b13e3e' : '#1a6f8f';
    toast.style.color = 'white';
    toast.style.padding = '8px 20px';
    toast.style.borderRadius = '60px';
    toast.style.fontSize = '0.8rem';
    toast.style.zIndex = '1000';
    toast.style.fontWeight = '600';
    toast.style.border = '1px solid cyan';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 1800);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // event binding
  document.getElementById('spendMicBtn').addEventListener('click', () => {
    if (!spendRecognition) initSpendSpeech();
    if (spendListening) spendRecognition.stop();
    try { spendRecognition.start(); } catch(e) { initSpendSpeech(); spendRecognition?.start(); }
  });
  document.getElementById('addMicBtn').addEventListener('click', () => {
    if (!addRecognition) initAddSpeech();
    if (addListening) addRecognition.stop();
    try { addRecognition.start(); } catch(e) { initAddSpeech(); addRecognition?.start(); }
  });
  document.getElementById('summaryBtn').addEventListener('click', generateSummary);
  document.getElementById('setBalanceBtn').addEventListener('click', () => {
    let val = parseFloat(document.getElementById('initialBalInput').value);
    if (!isNaN(val)) setBalanceManually(val);
    else showToast("Invalid number", true);
  });

  // initial load
  loadData();
  initSpendSpeech();
  initAddSpeech();
  updateRandomQuote();
</script>
</body>
</html>
